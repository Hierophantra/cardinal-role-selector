<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Cardinal Roofing and Renovations">
  <defs>
    <style>
      .roof { fill: #0A0A0A; }
      .bird { fill: #C41E3A; }
      .wordmark { fill: #C41E3A; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 800; letter-spacing: -0.5px; }
      .sub { fill: #0A0A0A; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 600; letter-spacing: 4px; }
    </style>
  </defs>
  <!-- Mountain/roof silhouette -->
  <polygon class="roof" points="20,150 120,40 180,110 240,50 340,150" />
  <polygon class="roof" points="250,80 260,60 270,80 270,110 250,110" />
  <!-- House cutout window on left roof -->
  <rect x="75" y="110" width="18" height="18" fill="#141414"/>
  <!-- Cardinal bird silhouette (stylized) -->
  <path class="bird" d="M200 75 q8 -22 28 -22 q6 0 10 3 l6 -10 l4 12 q10 4 14 14 q4 10 -2 20 q-4 6 -12 8 l10 10 l-18 0 l-4 8 l-8 -8 q-18 -4 -24 -18 q-6 -14 -4 -17z"/>
  <circle cx="218" cy="68" r="1.6" fill="#0A0A0A"/>
  <!-- Wordmark -->
  <text class="wordmark" x="200" y="210" font-size="58" text-anchor="middle">CARDINAL</text>
  <text class="sub" x="200" y="238" font-size="14" text-anchor="middle">ROOFING &amp; RENOVATIONS</text>
</svg>
